x-orchestrator-build: &orchestrator-build
  context: .
  dockerfile: Dockerfile

services:
  browser-search:
    build: *orchestrator-build
    image: actualhuman/resilient-browser-search:dokploy
    restart: unless-stopped
    init: true
    stop_grace_period: 30s

    depends_on:
      searxng:
        condition: service_healthy
      # crawl4ai is optional and gracefully degraded; don't gate app startup on
      # its browser-launch healthcheck (matches compose.yaml).
      crawl4ai:
        condition: service_started
      camofox:
        condition: service_healthy
      egress-proxy:
        condition: service_healthy

    environment:
      DISPLAY: ":99"
      HOST: 0.0.0.0
      PORT: 8088

      # Required by the MCP HTTP host-validation middleware.
      ALLOWED_HOSTS: localhost,127.0.0.1,browser-search,browser-search-mcp
      ALLOWED_ORIGINS: localhost,127.0.0.1

      BROWSER_SEARCH_API_KEY: ${BROWSER_SEARCH_API_KEY:?Set BROWSER_SEARCH_API_KEY}
      SEARXNG_URL: http://searxng:8080
      CAMOFOX_URL: http://camofox:9377
      CRAWL4AI_ENABLED: ${CRAWL4AI_ENABLED:-true}
      CRAWL4AI_URL: http://crawl4ai:11235
      CRAWL4AI_TOKEN: ${CRAWL4AI_TOKEN:?Set CRAWL4AI_TOKEN}
      CRAWL4AI_TIMEOUT_MS: ${CRAWL4AI_TIMEOUT_MS:-45000}
      EGRESS_PROXY_URL: http://egress-proxy:3128
      CAMOFOX_API_KEY: ${CAMOFOX_API_KEY:?Set CAMOFOX_API_KEY}

      CLOAK_ENABLED: ${CLOAK_ENABLED:-true}
      CLOAKBROWSER_LICENSE_KEY: ${CLOAKBROWSER_LICENSE_KEY:-}
      CLOAK_PROXY: ${CLOAK_PROXY:-http://egress-proxy:3128}
      CLOAK_GEOIP: ${CLOAK_GEOIP:-false}
      CLOAK_HEADLESS: ${CLOAK_HEADLESS:-false}
      CLOAK_HUMANIZE: ${CLOAK_HUMANIZE:-true}
      CLOAK_TIMEZONE: ${CLOAK_TIMEZONE:-America/Los_Angeles}
      CLOAK_LOCALE: ${CLOAK_LOCALE:-en-US}

      DIRECT_TIMEOUT_MS: ${DIRECT_TIMEOUT_MS:-20000}
      BROWSER_TIMEOUT_MS: ${BROWSER_TIMEOUT_MS:-45000}
      CHALLENGE_WAIT_MS: ${CHALLENGE_WAIT_MS:-20000}
      BROWSER_CONCURRENCY: ${BROWSER_CONCURRENCY:-2}
      RESEARCH_CONCURRENCY: ${RESEARCH_CONCURRENCY:-4}
      MAX_RESPONSE_BYTES: ${MAX_RESPONSE_BYTES:-5000000}
    
    expose:
      - "8088"

    volumes:
      - cloak-cache:/home/browser/.cloakbrowser
      - browser-profiles:/data/profiles

    shm_size: 1gb

    security_opt:
      - no-new-privileges:true

    pids_limit: 512
    mem_limit: 4g
    cpus: 4

    networks:
      camofox-control:
      crawl4ai-control:
      searxng-control:
      internet:
      dokploy-network:
        aliases:
          - browser-search-mcp

  egress-proxy:
    build: *orchestrator-build
    image: actualhuman/resilient-browser-search:dokploy
    command:
      - node
      - dist/egress-proxy.js

    restart: unless-stopped
    init: true

    environment:
      EGRESS_PROXY_HOST: 0.0.0.0
      EGRESS_PROXY_PORT: 3128

    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:3128/healthz >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

    read_only: true

    tmpfs:
      - /tmp:size=32m,noexec,nosuid,nodev

    security_opt:
      - no-new-privileges:true

    pids_limit: 128
    mem_limit: 256m
    cpus: 1

    networks:
      camofox-control:
      crawl4ai-control:
      internet:

  searxng:
    build:
      context: .
      dockerfile: Dockerfile.searxng

    image: actualhuman/browser-search-searxng:dokploy
    restart: unless-stopped

    environment:
      SEARXNG_BASE_URL: http://searxng:8080/

    volumes:
      - searxng-cache:/var/cache/searxng

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          wget
          --header='X-Forwarded-For: 127.0.0.1'
          --header='X-Real-IP: 127.0.0.1'
          -qO-
          'http://127.0.0.1:8080/'
          >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

    security_opt:
      - no-new-privileges:true

    networks:
      searxng-control:
      internet:


  crawl4ai:
    build:
      context: .
      dockerfile: Dockerfile.crawl4ai

    image: actualhuman/browser-search-crawl4ai:dokploy
    restart: unless-stopped

    depends_on:
      egress-proxy:
        condition: service_healthy

    environment:
      CRAWL4AI_TOKEN: ${CRAWL4AI_TOKEN:?Set CRAWL4AI_TOKEN}
      CRAWL4AI_PROXY: http://egress-proxy:3128
      CRAWL4AI_USER_AGENT: "${WEB_USER_AGENT:-Mozilla/5.0 (compatible; ResilientBrowserSearch/0.2; +https://github.com/actual-human)}"
      CRAWL4AI_PAGE_TIMEOUT_MS: ${CRAWL4AI_PAGE_TIMEOUT_MS:-45000}
      CRAWL4AI_MAX_SCROLL_STEPS: ${CRAWL4AI_MAX_SCROLL_STEPS:-3}
      CRAWL4AI_SCAN_FULL_PAGE: ${CRAWL4AI_SCAN_FULL_PAGE:-false}

    shm_size: 1gb

    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:11235/healthz', timeout=3).read()"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

    security_opt:
      - no-new-privileges:true

    pids_limit: 256
    mem_limit: 2g
    cpus: 2

    networks:
      crawl4ai-control:

  camofox:
    build:
      context: .
      dockerfile: Dockerfile.camofox
      args:
        CAMOFOX_VERSION: 1.11.2

    image: actualhuman/camofox-browser:1.11.2-patched
    restart: unless-stopped

    depends_on:
      egress-proxy:
        condition: service_healthy

    environment:
      CAMOFOX_API_KEY: ${CAMOFOX_API_KEY:?Set CAMOFOX_API_KEY}
      CAMOFOX_CRASH_REPORT_ENABLED: "false"
      CAMOFOX_HOST: 0.0.0.0
      CAMOFOX_PORT: 9377

      PROXY_STRATEGY: round_robin
      PROXY_HOST: egress-proxy
      PROXY_PORT: 3128

    volumes:
      - camofox-data:/root/.camofox

    shm_size: 1gb

    healthcheck:
      test:
        - CMD-SHELL
        - curl -fsS http://127.0.0.1:9377/health >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

    security_opt:
      - no-new-privileges:true

    pids_limit: 256
    mem_limit: 2g
    cpus: 2

    networks:
      camofox-control:

networks:
  camofox-control:
    driver: bridge
    internal: true

  searxng-control:
    driver: bridge
    internal: true

  crawl4ai-control:
    driver: bridge
    internal: true

  internet:
    driver: bridge

  # Your existing attachable Dokploy overlay network.
  dokploy-network:
    external: true

volumes:
  browser-profiles:
  cloak-cache:
  camofox-data:
  searxng-cache: